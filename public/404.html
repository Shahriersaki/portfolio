<!doctype html>
<!--
  GitHub Pages serves this file for any path it doesn't recognize (e.g. a
  direct visit or refresh on /about). It encodes the requested path into a
  query string and redirects to index.html, where the inline script in
  index.html decodes it and pushes it back into the router.
  Source pattern: https://github.com/rafgraph/spa-github-pages
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/portfolio/');
    </script>
  </head>
  <body></body>
</html>
